    <!-- THIS SCRIPT MAKES THE PAPER AIRPLANE NOT RESPAWN ONCE ITS FLOWN ACROSS THE SCREEN -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var flyingImage = document.querySelector('.flying-image');
        
            // Add an event listener for the animationend event
            flyingImage.addEventListener('animationend', function () {
                // Hide the image when the animation is complete
                flyingImage.style.display = 'none';
            });
        });
